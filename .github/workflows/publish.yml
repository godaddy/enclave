# Publishes the `enclave` crate to crates.io on version tag push.
# CARGO_REGISTRY_TOKEN must be set in GitHub repo secrets before this workflow
# will succeed. Generate a token at https://crates.io/settings/tokens and add
# it as a repository secret named CARGO_REGISTRY_TOKEN.

name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libtss2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --features enclaveapp-keyring/signing,enclaveapp-keyring/encryption,enclaveapp-linux-tpm/signing,enclaveapp-linux-tpm/encryption -- -D warnings

      - name: Test
        run: cargo test --workspace --features enclaveapp-keyring/signing,enclaveapp-keyring/encryption,enclaveapp-linux-tpm/signing,enclaveapp-linux-tpm/encryption

      - name: Publish
        run: cargo publish -p enclave --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
